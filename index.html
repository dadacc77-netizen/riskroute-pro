<!DOCTYPE html>
<html>
<head>
  <title>My Map</title>
  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<input id="searchBox" type="text" placeholder="搜尋地點" style="width:300px; height:30px;">

<div id="map"></div>

<script>
function initMap() {
  const map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 22.6273, lng: 120.3014 }, // 高雄
    zoom: 13,
  });

  const input = document.getElementById("searchBox");
  const searchBox = new google.maps.places.SearchBox(input);

  map.controls[google.maps.ControlPosition.TOP_LEFT].push(input);

  let markers = [];

  searchBox.addListener("places_changed", () => {
    const places = searchBox.getPlaces();

    markers.forEach(marker => marker.setMap(null));
    markers = [];

    const bounds = new google.maps.LatLngBounds();

    places.forEach(place => {
      if (!place.geometry) return;

      const marker = new google.maps.Marker({
        map,
        title: place.name,
        position: place.geometry.location,
      });

      markers.push(marker);

      if (place.geometry.viewport) {
        bounds.union(place.geometry.viewport);
      } else {
        bounds.extend(place.geometry.location);
      }
    });

    map.fitBounds(bounds);
  });
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7oAFoZj_Gr0m4oUWUgzK_aROjLDaAqPM&libraries=places&callback=initMap" async defer></script>

</body>
</html>
