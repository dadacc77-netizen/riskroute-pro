<!DOCTYPE html>
<html>
<head>
  <title>RiskRoute Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:sans-serif; }

    #map { height:100vh; width:100%; }

    #searchCard {
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:15px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      z-index:10;
      display:flex;
      gap:10px;
    }

    #scoreCard {
      position:absolute;
      bottom:80px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:12px 18px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      z-index:10;
      font-size:16px;
    }

    #aiCard {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#111;
      color:#00ff88;
      padding:15px 20px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      z-index:10;
      max-width:90%;
      font-size:15px;
    }

    input {
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      padding:8px 12px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
    }
  </style>
</head>

<body>

<div id="searchCard">
  <input id="start" placeholder="起點">
  <input id="end" placeholder="終點">
  <button onclick="calcRoute()">開始</button>
</div>

<div id="scoreCard">
  ⚡ 最快：<span id="fastScore">0</span>　
  🛡 安全：<span id="safeScore">0</span>
</div>

<div id="aiCard">AI分析：等待路線計算...</div>

<div id="map"></div>

<script>
let map;
let directionsService;
let directionsRenderer;

// 🔥 控制AI呼叫（省錢）
let hasCalledAI = false;
let lastDecision = "";

// 🧠 決策
function makeDecision(fast, safe) {
  if (safe < fast) {
    return { decision: "安全路線", reason: "整體風險較低" };
  } else {
    return { decision: "最快路線", reason: "時間效率較高" };
  }
}

// 🤖 UI顯示
function showAI(text) {
  document.getElementById("aiCard").innerText = "AI分析：" + text;
}

// 🤖 AI呼叫（已加防刷 header）
async function callAI(decision, reason) {
  showAI("分析中...");

  try {
    const res = await fetch("https://riskroute-ai.onrender.com/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "mysecret123"
      },
      body: JSON.stringify({ decision, reason })
    });

    const data = await res.json();
    showAI(data.text);

  } catch (e) {
    showAI("AI暫時無法使用");
  }
}

// 🌧️ 天氣風險
function getWeatherRisk() {
  const rand = Math.random();
  if (rand > 0.8) return 8;
  if (rand > 0.5) return 4;
  return 0;
}

// 🚨 犯罪風險
function getCrimeRisk(lat, lng) {
  let risk = 0;

  if (lat > 25.03 && lat < 25.05) risk += 6;
  if (lng % 0.01 < 0.005) risk += 5;

  return risk;
}

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 25.0330, lng: 121.5654 },
    zoom: 13,
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({ map });
}

function calcRoute() {
  hasCalledAI = false;

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  if (!start || !end) return;

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: "WALKING",
    provideRouteAlternatives: true
  }, (result, status) => {

    if (status === "OK") {

      directionsRenderer.setDirections(result);

      const routes = result.routes;

      analyzeRoute(routes[0], "fast");

      if (routes[1]) {
        analyzeRoute(routes[1], "safe");
      }
    }
  });
}

function analyzeRoute(route, type) {
  let score = 0;
  const path = route.overview_path;

  path.forEach((point, i) => {
    if (i % 5 === 0) {
      score += Math.floor(Math.random() * 5);
      score += getCrimeRisk(point.lat(), point.lng());
      score += getWeatherRisk();
    }
  });

  if (type === "fast") {
    document.getElementById("fastScore").innerText = score;
  } else {
    document.getElementById("safeScore").innerText = score;
  }

  const fast = parseInt(document.getElementById("fastScore").innerText);
  const safe = parseInt(document.getElementById("safeScore").innerText);

  if ((fast !== 0 || safe !== 0) && !hasCalledAI) {
    hasCalledAI = true;

    const result = makeDecision(fast, safe);
    const key = result.decision + result.reason;

    if (key !== lastDecision) {
      lastDecision = key;
      callAI(result.decision, result.reason);
    }
  }
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMOOS5xt_lxybTNnS7tpcS55yYFjgHNaY&libraries=places&callback=initMap">
</script>

</body>
</html>
