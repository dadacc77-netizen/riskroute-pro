<!DOCTYPE html>
<html>
<head>
  <title>RiskRoute Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:sans-serif; }

    #map { height:100vh; width:100%; }

    #searchCard {
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:15px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      z-index:10;
      display:flex;
      gap:10px;
    }

    input {
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      padding:8px 12px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
    }

    #scoreCard {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:15px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      z-index:10;
      font-size:18px;
    }
  </style>
</head>

<body>

<div id="searchCard">
  <input id="start" placeholder="起點">
  <input id="end" placeholder="終點">
  <button onclick="calcRoute()">開始</button>
</div>

<div id="scoreCard">
  ⚡ 最快：<span id="fastScore">0</span>　
  🛡 安全：<span id="safeScore">0</span>
</div>

<div id="map"></div>

<script>
let map;
let directionsService;
let directionsRenderer;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 25.0330, lng: 121.5654 },
    zoom: 13,
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({ map });
}

function calcRoute() {
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: "WALKING",
    provideRouteAlternatives: true
  }, (result, status) => {

    if (status === "OK") {
      const routes = result.routes;

      analyzeRoute(routes[0], "fast");

      if (routes[1]) {
        analyzeRoute(routes[1], "safe");
      }
    }
  });
}

function analyzeRoute(route, type) {
  let score = 0;
  const path = route.overview_path;

  path.forEach((point, i) => {
    if (i % 5 === 0) {
      score += simulateRisk(point);
    }
  });

  if (type === "fast") {
    document.getElementById("fastScore").innerText = score;
  } else {
    document.getElementById("safeScore").innerText = score;
  }
}

// 👉 Demo用（之後可接真API）
function simulateRisk(point) {
  return Math.floor(Math.random() * 10);
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMOOS5xt_lxybTNnS7tpcS55yYFjgHNaY&libraries=places&callback=initMap">
</script>

</body>
</html>
